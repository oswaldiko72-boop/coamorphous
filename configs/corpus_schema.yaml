# =============================================================================
# corpus_schema.yaml
#
# Master-CSV:n skeema co-amorfisten lääkeparien korpukselle.
#
# MIKSI tämä tiedosto on olemassa:
#   - Skeema kuvataan KERRAN ihmisluettavassa muodossa, ja Pandera-skeema
#     generoidaan tästä YAML:sta dynaamisesti (src/coamorphous/corpus/schema.py).
#   - Tämä takaa, että dokumentaatio (ihmiselle) ja validointi (koneelle)
#     pysyvät synkronissa: ei voi muuttaa toista unohtamatta toista.
#   - Sarakkeet on jaettu kategorioihin (A-F), mikä helpottaa ymmärtämistä,
#     mutta master-CSV:n sarakejärjestys seuraa tämän tiedoston järjestystä.
#
# Sarakejärjestys CSV:ssä = avainten järjestys columns-osiossa (Python 3.7+
# dict säilyttää järjestyksen, ja PyYAML-safe_load palauttaa tavallisen dictin).
#
# TIETEELLINEN TAUSTA:
#   Ko-amorfinen järjestelmä = kaksi (tai useampi) lääkemolekyyliä, jotka
#   muodostavat yhteisen amorfisen faasin, jossa ei ole pitkän kantaman
#   järjestystä (toisin kuin kiteisessä). Tällaiset järjestelmät voivat
#   parantaa heikosti liukenevien lääkeaineiden biosaatavuutta, mutta ne
#   ovat termodynaamisesti epästabiileja ja taipuvaisia rekristallisaatioon.
# =============================================================================

version: "1"
description: >
  Master-CSV:n skeema co-amorfisten lääkeparien korpukselle (H1, kohta 2.1).
  Yksi rivi = yksi (drug_A, drug_B) -pari yhden lähteen (DOI) raportoimana.

# Enumit kerätään tähän, jotta niitä voi viitata useissa sarakkeissa.
# MIKSI enum: rajoitetut sallitut arvot estävät kirjoitusvirheet
# (esim. "spray-drying" vs "spray_drying"), jotka muuten pirstoisivat dataa.
enums:
  drug_role:
    - api          # active pharmaceutical ingredient (vaikuttava aine)
    - coformer     # esim. aminohappo, sokeri, pieni orgaaninen molekyyli
    - excipient    # apuaine (esim. PVP, mannitoli, polymeeri)
  ratio_reported_as:
    - mole_fraction
    - weight_fraction
    - molar_ratio
    - weight_ratio
  process_method:
    - melt_quench         # sulatus + nopea jäähdytys
    - cryo_milling        # kylmäjauhatus nestetyppilämpötilassa
    - spray_drying        # liuoksen sumutuskuivaus
    - solvent_evaporation # liuotinhaihdutus
    - ball_milling        # kuulamylly (huoneenlämpö)
    - liquid_assisted_grinding # LAG, pieni määrä liuotinta jauhatuksen apuna
    - co_precipitation         # liuoksen saostus
    - freeze_drying            # jäädytyskuivaus / lyofilisaatio
    - hot_melt_extrusion       # HME, polymeerimatriisin sulatusekstruusio
    - quench_cooling           # sulasta nopeasti jäähdytetty (ei melt-quench DSC:ssä)
    - other
  gfa_class:
    # Baird et al. 2010 (DOI 10.1002/jps.22197) GFA-luokitus DSC-syklin
    # heating-cooling-reheating perusteella. Tämä on **molekyylin sisäinen**
    # ominaisuus, ei stabiilisuusmittaus säilytysoloissa:
    # I  = kiteytyy DSC-jäähdytyksellä (huono lasinmuodostaja).
    # II = ei kiteydy jäähdytyksellä, mutta uudelleenkiteytyy
    #      uudelleenlämmityksellä (keskinkertainen).
    # III = ei kiteydy jäähdytyksellä eikä uudelleenlämmityksellä (hyvä).
    - 1
    - 2
    - 3
  gfa_dsc_evidence:
    # Mistä gfa_class_dsc on johdettu — tärkeä audit-tieto, koska eri
    # todistustyypit saavat eri label_confidence-arvon. Arvot rankattu
    # luotettavuuden mukaan korkeasta matalaan.
    - dsc_cycle_full_reported  # täysi DSC heating-cooling-reheating-sykli raportoitu (paras)
    - dsc_thermogram_inferred  # päätelty DSC-termogrammin piirteistä (kiteytymispiikki tms.)
    - stated_explicitly        # artikkeli ilmoittaa luokan/käyttäytymisen suoraan tekstinä
    - not_reported             # ei DSC- eikä eksplisiittistä tietoa saatavilla
  gfa_label_confidence:
    # GFA-luokituksen luotettavuus. Erotettu stability_label_confidencesta,
    # koska DSC-pohjainen luokitus on tiukasti molekyylin ominaisuus eikä
    # riipu säilytysoloista.
    - high     # täysi DSC-sykli tai eksplisiittinen lähteen maininta
    - low      # päätelty epäsuorasti (esim. yksittäinen lämmitys, ei sykliä)
    - unknown  # gfa_class_dsc on None — luokitus ei ole määritelty
  stability_week_bin:
    # Stabiilisuusajan diskreetti binitys. MIKSI bin: induktioaika on hyvin
    # vinoutuneesti jakaantunut (muutamasta päivästä useaan vuoteen), ja
    # luokitusmallit hyötyvät kvantisoidusta kohdemuuttujasta. Censored-tieto
    # säilytetään erikseen induction_time_censored-sarakkeessa.
    - "<1w"
    - "1-2w"
    - "2-3w"
    - "3-4w"
    - "1-2m"
    - "2-3m"
    - "3-4m"
    - "4-5m"
    - "5-6m"
    - "6-7m"
    - "7-8m"
    - "8-9m"
    - "9-10m"
    - "10-11m"
    - "11-12m"
    - ">=12m"
    - "unknown"
  stability_label_confidence:
    # Stabiilisuusluokituksen luotettavuus, joka riippuu vain protokollasta:
    # ICH Q1A -standardit -> 'high', muut -> 'low'.
    - high
    - low
  detection_methods_examples: # ei strict-enum, vapaa pilkulla erotettu lista
    - PXRD
    - DSC
    - SS-NMR
    - FT-IR
    - Raman
    - POM         # polarisoivan valon mikroskopia

  # MIKSI experimental_protocol-enum:
  # H1:n lähteet käyttävät hyvin eri stabiilisuusprotokollia. Baird-Taylor (2012)
  # määrittelee Class III:n ICH Q1A -tyyppisten 40/75 (180 vrk) tai 25/60 (365 vrk)
  # -kokeiden perusteella, mutta kirjallisuudessa esiintyy myös kuivasäilytys
  # (P2O5/silica gel, RH ≈ 0 %), Tg+15 K -kineettisiä testejä ja pelkkä DSC-uusinta.
  # Protokollan kirjaaminen tähän kenttään mahdollistaa, että luokituslogiikka
  # voi soveltaa eri sääntöjä ja että label_confidence asetetaan oikein
  # (standardit -> 'high' mahdollinen, ei-standardit -> aina 'low'/'borderline').
  experimental_protocol:
    - ich_q1a_accelerated      # 40 °C / 75 % RH (Baird-Taylor accelerated, ICH Q1A)
    - ich_q1a_long_term        # 25 °C / 60 % RH (Baird-Taylor ambient, ICH Q1A)
    - dry_short_term           # P2O5 / silica gel desiccator, RH ≈ 0 %, 7-30 vrk
                               # (esim. Löbmann 2011/2013, lyhyen aikavälin tutkimukset)
    - tg_plus_15K              # Tg+15 K kineettinen testi (Class I -määrittely)
    - dsc_in_situ              # DSC-jäähdytys/uudelleenlämmitys ainoa testi
    - above_tg_kinetic         # T > Tg + 15 K, kineettinen kiteytymiskoe (BDS,
                               # isothermal DSC). EI ole pitkäaikainen säilyvyyskoe.
    - non_standard             # muu, kuvaa process_details- tai notes-kentässä

columns:
  # ---------------------------------------------------------------------------
  # A. IDENTITEETTI
  # MIKSI: Yksi pari per rivi täytyy pystyä viittaamaan yksiselitteisesti, ja
  # SMILES + InChIKey antavat kemiallisen identiteetin lähteestä riippumatta.
  # ---------------------------------------------------------------------------
  pair_id:
    dtype: string
    nullable: false
    unique: true
    description: >
      Globaalisti uniikki tunniste muodossa "{first_author}{year}_{n}",
      esim. "lobmann2013_03". Yhdistää dataa lähteiden ja taulukoiden välillä.
  entry_id:
    dtype: string
    nullable: false
    description: >
      Lähdekohtainen tunniste (esim. "Table2_row3"); auttaa palaamaan
      alkuperäiseen julkaisuun manuaalisessa tarkastuksessa.

  drug_A_name:
    dtype: string
    nullable: false
  drug_B_name:
    dtype: string
    nullable: false

  drug_A_role:
    dtype: string
    nullable: false
    enum: drug_role
  drug_B_role:
    dtype: string
    nullable: false
    enum: drug_role

  # MIKSI sekä original että canonical SMILES:
  # Alkuperäinen säilyy auditointia varten (mistä se otettiin), ja kanoninen
  # tehdään RDKit:llä (Chem.MolToSmiles), jotta sama molekyyli saa aina saman
  # merkkijonon riippumatta siitä, miten julkaisu sen kirjoitti.
  drug_A_smiles_original:
    dtype: string
    nullable: true
  drug_B_smiles_original:
    dtype: string
    nullable: true
  drug_A_smiles_canonical:
    dtype: string
    nullable: true
  drug_B_smiles_canonical:
    dtype: string
    nullable: true

  # InChIKey on 27-merkkinen hash kemiallisesta rakenteesta — tehokas avain
  # PubChem/DrugBank-hakuihin ja duplikaattien tunnistukseen.
  drug_A_inchikey:
    dtype: string
    nullable: true
  drug_B_inchikey:
    dtype: string
    nullable: true

  drug_A_cas:
    dtype: string
    nullable: true
    description: CAS-rekisterinumero, jos raportoitu.
  drug_B_cas:
    dtype: string
    nullable: true

  # ---------------------------------------------------------------------------
  # B. KOOSTUMUS JA PROSESSI
  # MIKSI: Sama lääkepari voi olla luokassa I yhdellä molisuhteella ja
  # luokassa III toisella; valmistustapa vaikuttaa amorfiseen rakenteeseen.
  # ---------------------------------------------------------------------------
  mole_fraction_A:
    dtype: float
    nullable: true
    ge: 0.0
    le: 1.0
  mole_fraction_B:
    dtype: float
    nullable: true
    ge: 0.0
    le: 1.0
  # Alkuperäiset (snäppäämättömät) molisuhteet auditointia varten. Ne
  # täytetään merge-vaiheessa harmonize_mole_fractions-funktiolla; interim-
  # ekstraktiot eivät kirjoita näitä sarakkeita itse. Merge yhtenäistää eri
  # tarkkuudella raportoidut suhteet (esim. 0.667 ja 0.6667 -> 0.6667 = 2/3),
  # mutta säilyttää massapainotetut tarkkat arvot kuten 0.506 ennallaan.
  mole_fraction_A_raw:
    dtype: float
    nullable: true
    ge: 0.0
    le: 1.0
    description: >
      Alkuperäinen mole_fraction_A ennen snäppäystä yksinkertaiseen suhteeseen.
      Sama kuin mole_fraction_A jos arvo ei lähestynyt yhtään p/q-suhdetta.
  mole_fraction_B_raw:
    dtype: float
    nullable: true
    ge: 0.0
    le: 1.0
    description: >
      Alkuperäinen mole_fraction_B ennen snäppäystä.
  weight_fraction_A:
    dtype: float
    nullable: true
    ge: 0.0
    le: 1.0
  weight_fraction_B:
    dtype: float
    nullable: true
    ge: 0.0
    le: 1.0
  ratio_reported_as:
    dtype: string
    nullable: true
    enum: ratio_reported_as
  process_method:
    dtype: string
    nullable: true
    enum: process_method
  process_details:
    dtype: string
    nullable: true
    description: Vapaamuotoinen kuvaus (esim. "200 rpm, 60 min, 5 mm steel balls").

  # ---------------------------------------------------------------------------
  # C. KOHDEMUUTTUJAT (LABEL)
  #
  # Kaksi erillistä ennustekohdetta:
  #   1. gfa_class_dsc — DSC-pohjainen lasinmuodostumiskyky (intrinsinen
  #      molekyylin ominaisuus, Baird et al. 2010).
  #   2. stability_week_bin — säilytysolojen stabiilisuusaika binitettynä
  #      (kontekstiriippuvainen kohde, ICH Q1A).
  #
  # MIKSI erotettu: aiemmin yksi gfa_class sekoitti molemmat. ML-malli oppi
  # silloin sekoitelman, jolla oli huono yleistettävyys uusiin
  # säilytysolosuhteisiin. Erotellut kohteet sallivat sekä per-pari -GFA-
  # ennusteen että protokollakohtaisen stabiilisuusennusteen.
  # ---------------------------------------------------------------------------
  gfa_class_dsc:
    dtype: int
    nullable: true
    enum: gfa_class
    description: >
      Baird et al. 2010 -luokitus DSC heating-cooling-reheating syklin
      perusteella. Class I = kiteytyy jäähdytyksellä; II = kiteytyy
      uudelleenlämmityksellä; III = ei kiteydy. Vrt. gfa_dsc_evidence:
      tieto pohjautuu joko raakaan DSC-syklin havaintoon tai artikkelin
      ilmoitukseen.
  gfa_class_label:
    dtype: string
    nullable: true
    description: >
      Ihmisluettava muoto gfa_class_dsc-arvosta (esim. "Class II");
      redundantti, mutta hyödyllinen visualisoinnissa ja raportoinnissa.
  gfa_dsc_evidence:
    dtype: string
    nullable: true
    enum: gfa_dsc_evidence
    description: >
      Lähde, josta gfa_class_dsc on johdettu: dsc_cycle_full_reported
      (paras, koko heating-cooling-reheating raportoitu), dsc_thermogram_inferred
      (yksittäisen DSC-skaanin piirteistä päätelty), stated_explicitly
      (artikkeli sanoo suoraan tekstinä) tai not_reported.
  gfa_label_confidence:
    dtype: string
    nullable: true
    enum: gfa_label_confidence
    description: >
      'high' kun täysi DSC-sykli tai eksplisiittinen lähteen maininta,
      'low' kun päätelty epäsuorasti, 'unknown' kun gfa_class_dsc=None.
      Erotettu stability_label_confidence-arvosta, jotta ML-mallin opetuksessa
      voi painottaa kemiallista (GFA) ja säilyvyysvariablen erikseen.
  stability_week_bin:
    dtype: string
    nullable: true
    enum: stability_week_bin
    description: >
      Stabiilisuusajan diskreetti bini induction_time_days-arvosta:
      "<1w", "1-2w", ..., "11-12m", ">=12m", "unknown". Censored-tieto
      säilyy induction_time_censored-sarakkeessa. Tämä on stability-mallin
      kohdemuuttuja.
  stability_protocol_match:
    dtype: string
    nullable: true
    enum: experimental_protocol
    description: >
      Mihin protokollatyyppiin storage_T_C/storage_RH_percent vastaa, kun
      experimental_protocol ja Tg_K on otettu huomioon. Käytetään
      stability_label_confidence-arvon laskennassa. Erityistapaus
      above_tg_kinetic = T > Tg + 15 K, kineettinen kiteytymiskoe (BDS,
      isothermal DSC). EI ole pitkäaikainen säilyvyyskoe.
  stability_label_confidence:
    dtype: string
    nullable: true
    enum: stability_label_confidence
    description: >
      'high' jos stability_protocol_match on ich_q1a_accelerated tai
      ich_q1a_long_term, muuten 'low'. Heijastaa, miten luotettavasti
      stability_week_bin yleistyy ICH-standardeihin.

  # MIKSI induktioaika: aika, jolloin näytteessä havaitaan kiteytymisen
  # alkua (PXRD/DSC/Raman); tämä on Baird-Taylor luokituksen pääsyöte.
  induction_time_days:
    dtype: float
    nullable: true
    ge: 0.0
  induction_time_censored:
    dtype: bool
    nullable: true
    description: >
      True jos koe päättyi ennen kiteytymistä (sensored / right-censored).
      Tämä on tilastollisesti tärkeä: esim. ">365 days" ei ole sama kuin
      "365 days".

  storage_T_C:
    dtype: float
    nullable: true
    description: >
      Säilytyslämpötila celsiuksina (poikkeus: muut lämpötilat (Tg_K, Tm_K)
      ovat kelvineinä, mutta säilytysolot raportoidaan kirjallisuudessa
      aina celsiuksina (esim. ICH Q1A: 25/30/40 °C) ja niitä on
      käytännöllisempi käsitellä alkuperäisessä yksikössä).
  storage_RH_percent:
    dtype: float
    nullable: true
    ge: 0.0
    le: 100.0
    description: Suhteellinen kosteus prosentteina.

  # ---------------------------------------------------------------------------
  # D. TERMODYNAAMISET MITTAUKSET
  # ---------------------------------------------------------------------------
  Tg_K:
    dtype: float
    nullable: true
    description: Lasittumislämpötila kelvineinä (DSC mittaa, usein midpoint).
  Tg_uncertainty_K:
    dtype: float
    nullable: true
    ge: 0.0
  Tg_heating_rate_K_min:
    dtype: float
    nullable: true
    description: >
      Lämmitysnopeus DSC-mittauksessa. Tärkeä metadata, koska Tg riippuu
      lämmitysnopeudesta (kineettinen ilmiö, ei termodynaaminen vaiheraja).
  Tm_A_K:
    dtype: float
    nullable: true
    description: Puhtaan A:n sulamispiste (kiteinen referenssi).
  Tm_B_K:
    dtype: float
    nullable: true
  pxrd_amorphous:
    dtype: bool
    nullable: true
    description: >
      True jos PXRD vahvisti amorfisuuden (halo, ei Bragg-piikkejä). Tämä on
      kriittinen sulkemiskriteeri: muuten voidaan luulla amorfiseksi näytettä,
      joka onkin nanokiteinen.
  detection_methods:
    dtype: string
    nullable: true
    description: Pilkulla erotettu lista, esim. "PXRD,DSC,SS-NMR".

  # ---------------------------------------------------------------------------
  # E. LÄHDEMETADATA
  # MIKSI: Koko korpus täytyy pystyä jäljittämään lähteeseen — toistettavuus
  # ja vertaisarviointi vaativat sen.
  # ---------------------------------------------------------------------------
  source_doi:
    dtype: string
    nullable: false
  source_first_author:
    dtype: string
    nullable: false
  source_year:
    dtype: int
    nullable: false
    ge: 1950
    le: 2100
  source_table_or_figure:
    dtype: string
    nullable: true
    description: 'Esim. "Table 2" tai "Figure 4a".'
  extraction_date:
    dtype: string
    nullable: false
    description: ISO-päivämäärä YYYY-MM-DD ekstraktion ajankohtana.
  extracted_by:
    dtype: string
    nullable: true
    description: Ekstraktion tehnyt henkilö (initialit / nimi).
  notes:
    dtype: string
    nullable: true

  # MIKSI nämä kolme protokolla- ja olosaraketta tähän:
  # E-kategoria sisältää lähdemetadatan, ja experimental_protocol kuvaa miten
  # alkuperäinen julkaisu mittasi stabiiliutta. Tämä syöte vaikuttaa
  # stability_protocol_match- ja stability_label_confidence -laskentaan
  # (src/coamorphous/corpus/classify.py).
  experimental_protocol:
    dtype: string
    nullable: true
    enum: experimental_protocol
    description: >
      Artikkelin raportoima protokollatunniste tai None. Käytetään
      stability_protocol_match-laskennassa: jos eksplisiittinen, otetaan
      sellaisenaan; muutoin pääteltävä storage_T_C/storage_RH_percent- ja
      Tg_K-arvoista. above_tg_kinetic = T > Tg + 15 K, kineettinen
      kiteytymiskoe (BDS, isothermal DSC). EI ole pitkäaikainen säilyvyyskoe.
  protocol_max_duration_days:
    dtype: float
    nullable: true
    ge: 0.0
    description: >
      Kokeilun maksimikesto vuorokausina. Tämä tunnistaa, onko kokeilu
      tarpeeksi pitkä tukemaan Class III -luokitusta (Baird-Taylor vaatii
      vähintään 180 vrk kiihdytetyssä, 365 vrk tavanomaisessa).
  storage_T_K:
    dtype: float
    nullable: true
    description: >
      Säilytyslämpötila kelvineinä. Vapaaehtoinen yhdenmukaistuskenttä
      (storage_T_C on autoritäätti). Voidaan laskea storage_T_C + 273.15
      jälkikäteen tai jättää tyhjäksi.

  # ---------------------------------------------------------------------------
  # F. PARI-TASON JOHDETUT PIIRTEET (täytetään 2.4:ssä)
  # MIKSI nimet varataan jo nyt:
  #   - Skeema dokumentoi sopimuksen ekstraktion ja deskriptorilaskennan välillä.
  #   - Jos H1:ssä päätetään käyttää delta_TPSA-nimeä, niin H2/H3:n
  #     analyysinotebookit voivat luottaa siihen.
  #   - Kaikki nullable: true, koska ne lasketaan jälkikäteen.
  # ---------------------------------------------------------------------------
  delta_MW:
    dtype: float
    nullable: true
    description: "abs(MW_A - MW_B), molekyylimassojen erotus (g/mol)."
  delta_LogP:
    dtype: float
    nullable: true
    description: LogP-erotus; korreloi sekoittuvuuden kanssa.
  delta_TPSA:
    dtype: float
    nullable: true
    description: Topological polar surface area -erotus.
  delta_HBD:
    dtype: float
    nullable: true
    description: Vetysidoksen luovuttajien (donors) lukumäärän erotus.
  delta_HBA:
    dtype: float
    nullable: true
    description: Vetysidoksen vastaanottajien (acceptors) lukumäärän erotus.
  sum_MW:
    dtype: float
    nullable: true
  tanimoto_ECFP4:
    dtype: float
    nullable: true
    ge: 0.0
    le: 1.0
    description: Tanimoto-similariteetti ECFP4-sormenjäljistä (radius 2).
  tanimoto_ECFP6:
    dtype: float
    nullable: true
    ge: 0.0
    le: 1.0
    description: ECFP6 (radius 3); herkempi ympäristön rakenteelle.
  hbond_complementarity:
    dtype: float
    nullable: true
    description: >
      Heuristinen mittari: min(HBD_A, HBA_B) + min(HBD_B, HBA_A).
      Korkea arvo = pari voi muodostaa molemminpuolisia vetysidoksia,
      mikä stabiloi amorfista faasia.
